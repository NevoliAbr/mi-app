<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { min-height:100%; font-family:'Montserrat',sans-serif; background:#F3F4F6; }

    /* ── NAVBAR ── */
    nav {
      background:#005D97; padding:0 40px; height:64px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,.35);
    }
    .nav-left  { display:flex; align-items:center; gap:16px; }
    .nav-right { display:flex; align-items:center; gap:14px; }
    .logo-img  { height:40px; width:40px; object-fit:contain; border-radius:12px; background:#fff; padding:4px; display:block; }
    .nav-title { color:rgba(255,255,255,.75); font-size:13px; font-weight:700; letter-spacing:.4px; }
    .btn-nav {
      background:transparent; border:2px solid rgba(255,255,255,.45); color:white;
      padding:6px 16px; border-radius:30px; font-family:'Montserrat',sans-serif;
      font-size:12px; font-weight:700; cursor:pointer; text-decoration:none;
      display:inline-flex; align-items:center; gap:6px; transition:border-color .15s, background .15s;
    }
    .btn-nav:hover { border-color:white; background:rgba(255,255,255,.12); }

    /* ── PAGE HEADER ── */
    .page-header { background:linear-gradient(135deg,#003E66 0%,#003E66 45%,#005D97 100%); padding:32px 40px 28px; color:white; }
    .page-header h1 { font-size:26px; font-weight:900; letter-spacing:-.5px; }
    .page-header p  { margin-top:6px; font-size:13px; color:rgba(255,255,255,.65); font-weight:600; }
    .header-stripe  { height:3px; background:linear-gradient(90deg,#00AEEF,#005D97); }

    /* ── MAIN ── */
    main { padding:32px 40px 60px; max-width:960px; margin:0 auto; display:flex; flex-direction:column; gap:28px; }

    /* ── CARD BASE ── */
    .card { background:white; border-radius:16px; box-shadow:0 2px 12px rgba(0,0,0,.08); overflow:hidden; }
    .card-header {
      background:linear-gradient(135deg,#003E66 0%,#005D97 100%);
      padding:18px 24px; display:flex; align-items:center; gap:12px; color:white;
    }
    .card-header-icon { font-size:20px; }
    .card-header h2  { font-size:16px; font-weight:800; }
    .card-stripe { height:3px; background:linear-gradient(90deg,#00AEEF,transparent); }
    .card-body  { padding:28px 24px; }

    /* ── INFO BÁSICA ── */
    .info-layout { display:flex; align-items:center; gap:28px; }
    .info-photo  {
      width:96px; height:96px; border-radius:50%; flex-shrink:0;
      background:#E5E7EB; border:4px solid #E5E7EB;
      display:flex; align-items:center; justify-content:center;
      font-size:40px; overflow:hidden;
    }
    .info-photo img { width:100%; height:100%; object-fit:cover; }
    .info-fields { display:flex; flex-direction:column; gap:10px; }
    .info-row { display:flex; flex-direction:column; gap:2px; }
    .info-label { font-size:10px; font-weight:800; color:#9CA3AF; letter-spacing:.7px; text-transform:uppercase; }
    .info-value { font-size:15px; font-weight:700; color:#1A1A1A; }
    .info-badge {
      display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px;
      font-size:11px; font-weight:800; margin-top:2px;
    }
    .badge-super    { background:#E0F0FF; color:#003E66; }
    .badge-usuario  { background:#EFF6FF; color:#005D97; }
    .badge-operacional    { background:#F5F3FF; color:#6D28D9; }
    .badge-desarrollolead { background:#FFF7ED; color:#C2410C; }

    .proyectos-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
    .proy-chip {
      display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px;
      font-size:11px; font-weight:800; background:#E0F0FF; color:#003E66; letter-spacing:.2px;
    }

    /* ── MIS TAREAS (kanban) ── */
    .kt-wrap { overflow-x:auto; }
    .kt-table { width:100%; border-collapse:collapse; }
    .kt-table thead tr { background:#F9FAFB; border-bottom:2px solid #E5E7EB; }
    .kt-table th { padding:9px 12px; text-align:left; font-size:10px; font-weight:800; color:#6B7280; letter-spacing:.7px; text-transform:uppercase; white-space:nowrap; }
    .kt-table tbody tr { border-bottom:1px solid #F3F4F6; cursor:pointer; transition:background .1s; }
    .kt-table tbody tr:hover { background:#F0F6FF; }
    .kt-table tbody tr:last-child { border-bottom:none; }
    .kt-table td { padding:10px 12px; font-size:12px; color:#374151; vertical-align:middle; }
    .kt-empty { text-align:center; padding:40px; color:#9CA3AF; font-size:13px; }

    /* módulo mini-badge */
    .kt-mod { display:inline-block; padding:2px 8px; border-radius:5px; font-size:9px; font-weight:900; color:white; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
    .mod-caja              { background:linear-gradient(90deg,#0F766E,#2DD4BF); }
    .mod-recaudacion       { background:linear-gradient(90deg,#1D4ED8,#60A5FA); }
    .mod-predio            { background:linear-gradient(90deg,#7C3AED,#C084FC); }
    .mod-catastro          { background:linear-gradient(90deg,#B45309,#FCD34D); }
    .mod-control_vehicular { background:linear-gradient(90deg,#0369A1,#38BDF8); }
    .mod-adquisiciones     { background:linear-gradient(90deg,#BE185D,#F472B6); }
    .mod-presupuestos      { background:linear-gradient(90deg,#065F46,#34D399); }
    .mod-generales         { background:linear-gradient(90deg,#374151,#9CA3AF); }
    .mod-tramites          { background:linear-gradient(90deg,#92400E,#FBBF24); }
    .mod-nr_web            { background:linear-gradient(90deg,#1E3A5F,#3B82F6); }
    .mod-nr_escritorio     { background:linear-gradient(90deg,#3B0764,#A855F7); }
    .mod-predio_web        { background:linear-gradient(90deg,#0F766E,#34D399); }
    .mod-obra_publica      { background:linear-gradient(90deg,#C2410C,#FB923C); }
    .mod-tesoreria         { background:linear-gradient(90deg,#1E40AF,#3B82F6); }

    /* prioridad */
    .pri-badge { display:inline-flex; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:800; white-space:nowrap; }
    .pri-baja    { background:#F1F5F9; color:#64748B; }
    .pri-media   { background:#EFF6FF; color:#2563EB; }
    .pri-alta    { background:#FFFBEB; color:#D97706; }
    .pri-critica { background:#FEF2F2; color:#EF4444; }

    .kt-title { font-weight:700; color:#1A1A1A; max-width:200px; }
    .kt-date  { white-space:nowrap; color:#6B7280; }
    .kt-link  { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; background:#EFF6FF; color:#1D4ED8; border-radius:20px; font-size:11px; font-weight:800; text-decoration:none; transition:background .15s; }
    .kt-link:hover { background:#DBEAFE; }

    /* ── TOAST ── */
    #toast { position:fixed; bottom:24px; right:24px; z-index:9999; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:700; color:white; box-shadow:0 6px 24px rgba(0,0,0,.2); display:none; animation:fadeUp .2s ease; }
    #toast.success { background:#16A34A; }
    #toast.error   { background:#C41010; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    @media(max-width:640px) {
      nav { padding:0 16px; }
      .page-header { padding:24px 16px 20px; }
      main { padding:20px 16px 40px; }
      .info-layout { flex-direction:column; align-items:flex-start; }
      .form-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html">
      <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'" />
    </a>
    <span class="nav-title">PERFIL</span>
  </div>
  <div class="nav-right">
    <a href="index.html" class="btn-nav">← Inicio</a>
  </div>
</nav>

<div class="page-header">
  <h1>👤 Perfil</h1>
  <p>Tu información personal y tareas asignadas.</p>
</div>
<div class="header-stripe"></div>

<main>

  <!-- ── Módulo 1: Información básica ── -->
  <div class="card">
    <div class="card-header">
      <span class="card-header-icon">👤</span>
      <h2>Información Básica</h2>
    </div>
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="info-layout">
        <div class="info-photo" id="info-photo">👤</div>
        <div class="info-fields">
          <div class="info-row">
            <span class="info-label">Nombre</span>
            <span class="info-value" id="info-nombre">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Correo electrónico</span>
            <span class="info-value" id="info-correo">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Rol</span>
            <span class="info-badge" id="info-rol-badge">—</span>
          </div>
          <div class="info-row" id="info-proyectos-row" style="display:none">
            <span class="info-label">Proyectos</span>
            <div class="proyectos-chips" id="info-proyectos-chips"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Módulo 2: Mis Tareas del Board ── -->
  <div class="card">
    <div class="card-header" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <span class="card-header-icon">📋</span>
        <h2>Mis Tareas</h2>
      </div>
      <a href="task.html" class="kt-link">Ver board completo →</a>
    </div>
    <div class="card-stripe"></div>
    <div class="card-body" style="padding:0">
      <div class="kt-wrap">
        <table class="kt-table">
          <thead>
            <tr>
              <th>Módulo</th>
              <th>Título</th>
              <th>Stage</th>
              <th>Prioridad</th>
              <th>Fecha límite</th>
              <th>Proyecto</th>
            </tr>
          </thead>
          <tbody id="kt-tbody">
            <tr><td colspan="6" class="kt-empty">Cargando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';

  /* ── Sesión ── */
  let session = null;
  try { session = JSON.parse(localStorage.getItem('session')); } catch {}
  if (!session) { window.location.href = 'index.html'; }

  /* ── Info básica ── */
  const ROL_MAP = {
    superusuario:   ['badge-super',   '⭐ Superusuario'],
    operacional:    ['badge-operacional',    '📊 Operacional'],
    desarrollolead: ['badge-desarrollolead', '💻 DesarrolloLead'],
    usuario:        ['badge-usuario', '👤 Usuario'],
  };
  document.getElementById('info-nombre').textContent = session.nombre || '—';
  document.getElementById('info-correo').textContent = session.email  || '—';
  const [rolCls, rolLbl] = ROL_MAP[session.rol] || ['badge-usuario', session.rol || '—'];
  const badge = document.getElementById('info-rol-badge');
  badge.textContent = rolLbl; badge.className = `info-badge ${rolCls}`;

  /* cargar foto, proyectos del usuario y poblar select */
  let userProyectos = [];
  (async () => {
    try {
      const res  = await fetch(`${API}/api/usuarios/${session.id}/info`);
      const data = await res.json();
      if (data.success && data.info?.foto) {
        document.getElementById('info-photo').innerHTML =
          `<img src="${API}${data.info.foto}" alt="Foto" />`;
      }
      if (data.success && data.proyectos?.length) {
        userProyectos = data.proyectos;
        document.getElementById('info-proyectos-chips').innerHTML =
          userProyectos.map(p => `<span class="proy-chip">${esc(p.nombre)}</span>`).join('');
        document.getElementById('info-proyectos-row').style.display = '';
        const sel = document.getElementById('f-proyecto');
        userProyectos.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id; opt.textContent = p.nombre;
          sel.appendChild(opt);
        });
      }
    } catch {}
  })();

  /* ── Helpers ── */
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, m =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });
  }

  let toastT;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = type; t.style.display = 'block';
    clearTimeout(toastT); toastT = setTimeout(() => t.style.display = 'none', 2800);
  }

  /* ── Constantes kanban ── */
  const MODULO_LABELS = {
    caja:'Caja', recaudacion:'Recaudación', predio:'Predio', catastro:'Catastro',
    control_vehicular:'Control Vehicular', adquisiciones:'Adquisiciones',
    presupuestos:'Presupuestos', generales:'Generales', tramites:'Trámites',
    nr_web:'Nic. Romero Web', nr_escritorio:'Nic. Romero Escritorio',
    predio_web:'Predio Web', obra_publica:'Obra Pública', tesoreria:'Tesorería',
  };
  const PRI_LABELS = { baja:'↓ Baja', media:'→ Media', alta:'↑ Alta', critica:'🔥 Crítica' };

  /* ── Mis Tareas del Board ── */
  async function loadKanbanTasks() {
    const tbody = document.getElementById('kt-tbody');
    try {
      const data = await fetch(`${API}/api/kanban/tasks`).then(r => r.json());
      if (!data.success) throw new Error(data.error || 'Error al cargar tareas');

      const uid = Number(session.id);
      const mine = (data.tasks || []).filter(t => {
        const ids = t.involucrados_ids
          ? String(t.involucrados_ids).split(',').map(Number).filter(Boolean) : [];
        return ids.includes(uid) || Number(t.asignado_a) === uid;
      });

      if (!mine.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="kt-empty">No tienes tareas asignadas aún.</td></tr>';
        return;
      }

      tbody.innerHTML = mine.map(t => {
        const stageColor = t.stage_color || '#94A3B8';
        const dueDate    = t.fecha_limite ? new Date(t.fecha_limite) : null;
        const isOverdue  = dueDate && dueDate < new Date();
        const dueColor   = isOverdue ? '#DC2626' : '#6B7280';
        return `<tr onclick="window.location.href='task.html'">
          <td>${t.modulo
            ? `<span class="kt-mod mod-${t.modulo}">${esc(MODULO_LABELS[t.modulo]||t.modulo)}</span>`
            : '<span style="color:#CBD5E1;font-size:11px">—</span>'}</td>
          <td class="kt-title">${esc(t.titulo)}</td>
          <td><span style="background:${stageColor}22;color:${stageColor};border:1px solid ${stageColor}55;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;white-space:nowrap">${esc(t.stage_nombre||'—')}</span></td>
          <td><span class="pri-badge pri-${t.prioridad||'media'}">${PRI_LABELS[t.prioridad]||'—'}</span></td>
          <td class="kt-date" style="color:${dueColor}">${t.fecha_limite ? fmtDate(t.fecha_limite) : '<span style="color:#CBD5E1">—</span>'}</td>
          <td>${t.proyecto_nombre ? `<span class="proy-chip">${esc(t.proyecto_nombre)}</span>` : '<span style="color:#CBD5E1;font-size:11px">—</span>'}</td>
        </tr>`;
      }).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="kt-empty" style="color:#C41010">Error: ${esc(err.message)}</td></tr>`;
    }
  }

  loadKanbanTasks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" media="print" onload="this.media='all'" /><noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" /></noscript>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { min-height:100%; font-family:'Montserrat',sans-serif; background:#F3F4F6; }

    .page-header {
      background:linear-gradient(135deg, #003E66 0%, #003E66 45%, #005D97 100%);
      padding:32px 40px 28px; color:white;
    }
    .page-header h1 { font-size:26px; font-weight:900; letter-spacing:-.5px; display:flex; align-items:center; gap:12px; }
    .page-header p  { margin-top:6px; font-size:13px; color:rgba(255,255,255,.65); font-weight:600; }
    .header-stripe  { height:3px; background:linear-gradient(90deg,#00AEEF,#005D97); }

    main { padding:32px 16px 60px; max-width:none; margin:0 auto; }

    .toolbar {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:14px; margin-bottom:18px;
    }
    .search-box {
      display:flex; align-items:center; gap:8px;
      background:#fff; border:2px solid #E5E7EB; border-radius:30px;
      padding:8px 18px; flex:1; max-width:360px;
    }
    .search-box input {
      border:none; outline:none; font-family:inherit; font-size:13px;
      color:#1A1A1A; width:100%; background:transparent;
    }
    .count-badge { font-size:12px; color:#6B7280; font-weight:700; }

    .table-card {
      background:#fff; border-radius:14px;
      box-shadow:0 1px 6px rgba(0,0,0,.08); overflow:hidden;
    }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:1400px; }
    thead { background:#F8FAFC; }
    th {
      padding:14px 16px; text-align:left;
      font-size:10px; font-weight:800; color:#6B7280;
      text-transform:uppercase; letter-spacing:.6px;
      border-bottom:2px solid #E5E7EB; white-space:nowrap;
    }
    td {
      padding:14px 16px; font-size:13px; font-weight:500;
      color:#374151; vertical-align:top; border-bottom:1px solid #F0F0F0;
    }
    tbody tr:hover td { background:#F9FAFB; }
    .col-num { color:#005D97; font-weight:800; text-align:center; width:48px; }
    .nombre-cell { color:#1A1A1A; font-weight:800; min-width:180px; }
    .nombre-proy { color:#9CA3AF; font-size:11px; margin-top:2px; font-weight:600; line-height:1.3; }
    .nombre-corto { color:#6B7280; font-size:11px; margin-top:2px; font-weight:600; }
    .small { font-size:12px; color:#6B7280; }
    .pre-wrap { white-space:pre-wrap; max-width:280px; }
    .resp-chips { display:flex; flex-direction:column; gap:4px; }
    .resp-chip {
      background:#EFF6FF; color:#005D97; border:1px solid #BFDBFE;
      border-radius:12px; padding:2px 9px; font-size:11px; font-weight:700;
      width:fit-content;
    }
    .firm-chip {
      background:#F0FDF4; color:#166534; border:1px solid #BBF7D0;
      border-radius:12px; padding:2px 9px; font-size:11px; font-weight:700;
      width:fit-content; display:flex; align-items:center; gap:5px;
    }
    .firm-chip .firm-chip-rol {
      color:#166534; opacity:.65; font-weight:600;
    }
    .firm-ext-chip {
      background:#FFF7ED; color:#9A3412; border:1px solid #FED7AA;
      border-radius:12px; padding:2px 9px; font-size:11px; font-weight:700;
      width:fit-content;
    }
    .pdf-link {
      display:inline-flex; align-items:center; gap:5px;
      background:#EFF6FF; color:#005D97; border:1px solid #BFDBFE;
      border-radius:14px; padding:4px 11px; font-size:11px; font-weight:800;
      text-decoration:none; cursor:pointer; transition:background .15s;
    }
    .pdf-link:hover { background:#DBEAFE; }
    .empty-state {
      padding:60px 24px; text-align:center; color:#9CA3AF;
      font-size:13px; font-weight:600;
    }
    .empty-icon { font-size:42px; margin-bottom:12px; }

    /* PDF preview (lado derecho) */
    #pdf-preview-panel {
      display:none; position:fixed; top:0; right:0; width:48%; height:100vh;
      background:#111827; border-left:1px solid rgba(255,255,255,.12);
      box-shadow:-6px 0 40px rgba(0,0,0,.6); z-index:9999;
      flex-direction:column;
    }
    #pdf-preview-panel.show { display:flex; }
    #pdf-preview-bar {
      padding:10px 16px; background:#1f2937; font-size:11px; font-weight:700;
      color:rgba(255,255,255,.45); letter-spacing:.6px; text-transform:uppercase;
      border-bottom:1px solid rgba(255,255,255,.08); flex-shrink:0;
    }
    #pdf-preview-frame { flex:1; border:none; width:100%; }

    /* ── Botón firmantes cliente ── */
    .firm-popup-btn {
      display:inline-flex; align-items:center; gap:6px;
      background:#FFF7ED; color:#9A3412; border:1px solid #FED7AA;
      border-radius:14px; padding:4px 12px; font-family:inherit;
      font-size:11px; font-weight:800; cursor:pointer;
      transition:background .15s, border-color .15s;
    }
    .firm-popup-btn:hover { background:#FFEDD5; border-color:#FDBA74; }

    /* ── Modal firmantes ── */
    .firm-overlay {
      display:none; position:fixed; inset:0; z-index:2000;
      background:rgba(0,0,0,.45); align-items:center; justify-content:center;
    }
    .firm-overlay.open { display:flex; }
    .firm-modal {
      background:#fff; border-radius:16px; width:100%; max-width:480px;
      box-shadow:0 24px 64px rgba(0,0,0,.2); overflow:hidden;
    }
    .firm-modal-head {
      background:linear-gradient(135deg,#003E66,#005D97);
      padding:18px 24px; display:flex; align-items:center; justify-content:space-between;
    }
    .firm-modal-title { font-size:15px; font-weight:900; color:#fff; }
    .firm-modal-close {
      background:none; border:none; color:rgba(255,255,255,.6);
      font-size:20px; cursor:pointer; line-height:1; padding:0 4px;
    }
    .firm-modal-close:hover { color:#fff; }
    .firm-modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:12px; max-height:60vh; overflow-y:auto; }
    .firm-card {
      background:#FFF7ED; border:1px solid #FED7AA;
      border-radius:10px; padding:14px 16px;
    }
    .firm-card-nombre { font-size:14px; font-weight:800; color:#1A1A1A; margin-bottom:4px; }
    .firm-card-detail { display:flex; flex-direction:column; gap:3px; }
    .firm-card-row { font-size:12px; color:#6B7280; font-weight:600; }
    .firm-card-row span { color:#9A3412; font-weight:700; }

    @media (max-width:700px) {
      .page-header { padding:24px 16px; }
      main { padding:20px 12px 40px; }
    }
  </style>
</head>
<body>

<script src="navbar.js"></script>

<div class="page-header">
  <h1>📁 Proyectos</h1>
  <p>Consulta los proyectos registrados.</p>
</div>
<div class="header-stripe"></div>

<main>
  <div class="toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search" placeholder="Buscar por nombre, procedimiento o contrato…" />
    </div>
    <div class="count-badge" id="count">—</div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre / Nombre Proyecto</th>
            <th>Procedimiento</th>
            <th>Contrato</th>
            <th>Responsables</th>
            <th>Firmantes Interno</th>
            <th>Firmantes Cliente</th>
            <th>Vigencia</th>
            <th>Propuesta</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="9" class="empty-state"><div class="empty-icon">⏳</div>Cargando proyectos…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal Firmantes Cliente -->
<div class="firm-overlay" id="firm-overlay">
  <div class="firm-modal">
    <div class="firm-modal-head">
      <span class="firm-modal-title" id="firm-modal-title">Firmantes Cliente</span>
      <button class="firm-modal-close" id="firm-modal-close">✕</button>
    </div>
    <div class="firm-modal-body" id="firm-modal-body"></div>
  </div>
</div>

<!-- PDF preview -->
<div id="pdf-preview-panel">
  <div id="pdf-preview-bar">Vista previa — PDF</div>
  <iframe id="pdf-preview-frame" src="" loading="lazy"></iframe>
</div>

<script>
const session = JSON.parse(localStorage.getItem('session:v1') || 'null');
if (!session) { window.location.replace('index.html'); }

const API = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';
let proyectos = [];

function escH(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtVigencia(ini, fin) {
  const f = d => {
    if (!d) return null;
    const [y, m, day] = String(d).slice(0, 10).split('-').map(Number);
    return new Date(y, m - 1, day).toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
  };
  const vi = f(ini), vf = f(fin);
  return (vi || vf) ? `${vi || '—'} al ${vf || '—'}` : '—';
}

function render(list) {
  const tbody = document.getElementById('tbody');
  document.getElementById('count').textContent = `${list.length} proyecto${list.length === 1 ? '' : 's'}`;
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty-state"><div class="empty-icon">📭</div>No hay proyectos.</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map((p, i) => {
    const resps = Array.isArray(p.responsables) ? p.responsables : [];
    const respHtml = resps.length
      ? `<div class="resp-chips">${resps.map(r => `<span class="resp-chip">${escH(r.nombre || '')}</span>`).join('')}</div>`
      : `<span class="small">—</span>`;
    const firmInt = Array.isArray(p.firmantes_interno) ? p.firmantes_interno : [];
    const firmIntHtml = firmInt.length
      ? `<div class="resp-chips">${firmInt.map(f => `<span class="firm-chip">${escH(f.nombre || '')}${f.rol ? `<span class="firm-chip-rol">· ${escH(f.rol)}</span>` : ''}</span>`).join('')}</div>`
      : `<span class="small">—</span>`;
    const firmCli = Array.isArray(p.firmantes_cliente) ? p.firmantes_cliente : [];
    const firmCliHtml = firmCli.length
      ? `<button class="firm-popup-btn" data-firmantes="${escH(JSON.stringify(firmCli))}" data-proyecto="${escH(p.nombre || '')}">
           👥 ${firmCli.length} firmante${firmCli.length !== 1 ? 's' : ''}
         </button>`
      : `<span class="small">—</span>`;
    const pdfHtml = p.pdf_url
      ? `<a class="pdf-link" href="${escH(p.pdf_url)}" data-pdf-url="${escH(p.pdf_url)}" target="_blank" rel="noopener" download>📄 PDF</a>`
      : `<span class="small">—</span>`;
    const nombreProy = p.NombreProyecto && p.NombreProyecto !== p.nombre
      ? `<div class="nombre-proy">${escH(p.NombreProyecto)}</div>` : '';
    const nombreCorto = p.nombre_corto
      ? `<div class="nombre-corto">${escH(p.nombre_corto)}</div>` : '';
    return `<tr>
      <td class="col-num">${p.orden ?? (i + 1)}</td>
      <td class="nombre-cell">${escH(p.nombre || '—')}${nombreProy}${nombreCorto}</td>
      <td class="pre-wrap small">${escH(p.procedimiento || '—')}</td>
      <td class="small">${escH(p.contrato || '—')}</td>
      <td>${respHtml}</td>
      <td>${firmIntHtml}</td>
      <td>${firmCliHtml}</td>
      <td class="small">${escH(fmtVigencia(p.vigencia_inicio, p.vigencia_fin))}</td>
      <td>${pdfHtml}</td>
    </tr>`;
  }).join('');
}

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) { render(proyectos); return; }
  const filtered = proyectos.filter(p =>
    (p.nombre || '').toLowerCase().includes(q) ||
    (p.NombreProyecto || '').toLowerCase().includes(q) ||
    (p.procedimiento || '').toLowerCase().includes(q) ||
    (p.contrato || '').toLowerCase().includes(q)
  );
  render(filtered);
}

document.getElementById('search').addEventListener('input', applyFilter);

async function load() {
  const tbody = document.getElementById('tbody');
  try {
    const res  = await fetch(`${API}/api/proyectos`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Error al cargar.');
    proyectos = data.proyectos || [];
    render(proyectos);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty-state" style="color:#991B1B;">Error: ${escH(err.message)}</td></tr>`;
  }
}

/* ── PDF preview (hover, lado derecho, interactivo) ── */
(function () {
  const panel = document.getElementById('pdf-preview-panel');
  const frame = document.getElementById('pdf-preview-frame');
  let hideTimer = null;
  function show(url) {
    clearTimeout(hideTimer);
    if (frame.src !== location.origin + url && frame.src !== url) frame.src = url;
    panel.classList.add('show');
  }
  function hide() { hideTimer = setTimeout(() => panel.classList.remove('show'), 250); }
  document.addEventListener('mouseover', e => {
    const btn = e.target.closest('[data-pdf-url]');
    if (btn) show(btn.dataset.pdfUrl);
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('[data-pdf-url]')) hide();
  });
  panel.addEventListener('mouseenter', () => clearTimeout(hideTimer));
  panel.addEventListener('mouseleave', hide);
})();

load();

/* ── Modal Firmantes Cliente ── */
(function () {
  const overlay = document.getElementById('firm-overlay');
  const body    = document.getElementById('firm-modal-body');
  const title   = document.getElementById('firm-modal-title');

  function openModal(firmantes, proyecto) {
    title.textContent = `Firmantes Cliente — ${proyecto}`;
    body.innerHTML = firmantes.map(f => `
      <div class="firm-card">
        <div class="firm-card-nombre">${escH(f.nombre || '—')}</div>
        <div class="firm-card-detail">
          ${f.cargo ? `<div class="firm-card-row">Cargo: <span>${escH(f.cargo)}</span></div>` : ''}
          ${f.rol   ? `<div class="firm-card-row">Rol: <span>${escH(f.rol)}</span></div>`   : ''}
        </div>
      </div>`).join('');
    overlay.classList.add('open');
  }

  document.getElementById('firm-modal-close').addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

  document.getElementById('tbody').addEventListener('click', e => {
    const btn = e.target.closest('.firm-popup-btn');
    if (!btn) return;
    try {
      const firmantes = JSON.parse(btn.dataset.firmantes);
      openModal(firmantes, btn.dataset.proyecto);
    } catch {}
  });
})();
</script>
</body>
</html>
